# Secret material MUST be provided — no production defaults (Kimi P0).
{{- if not .Values.secrets.externalSecretName }}
{{- if or (not .Values.secrets.databaseUrl) (eq .Values.secrets.databaseUrl "") (not .Values.secrets.vaultMasterKey) (eq .Values.secrets.vaultMasterKey "") (eq .Values.secrets.vaultMasterKey "CHANGE-ME-IN-PROD") }}
{{- fail "helix-core: set secrets.databaseUrl and secrets.vaultMasterKey (or secrets.externalSecretName). Never use chart defaults in prod." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: helix-core-secrets
  labels:
    app.kubernetes.io/part-of: helix-core
type: Opaque
stringData:
  database_url: {{ .Values.secrets.databaseUrl | quote }}
  vault_master_key: {{ .Values.secrets.vaultMasterKey | quote }}
{{- end }}
