{{- if .Values.migration.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: helix-core-migrations
  labels:
    app.kubernetes.io/name: helix-core-migrations
    app.kubernetes.io/part-of: helix-core
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: helix-core-migrations
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrations
          # By default reuse the application image so the embedded migration
          # binary is available without mounting SQL files from the repo.
          image: {{ .Values.migration.image | default (printf "%s:%s" .Values.image.repository .Values.image.tag) | quote }}
          command: {{ toYaml (.Values.migration.command | default (list "helix-migrate")) | nindent 12 }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.externalSecretName | default "helix-core-secrets" }}
                  key: database_url
{{- end }}
