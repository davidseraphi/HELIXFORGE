apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helix-core
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: helixforge
  source:
    repoURL: https://github.com/helixforge/helixforge.git
    targetRevision: main
    path: infra/helm/helix-core
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: helix-core
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
