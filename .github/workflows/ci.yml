name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust-matrix:
    name: Rust ${{ matrix.os }} (fmt · clippy · test)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Record environment
        run: |
          rustc --version > rust-env.txt
          cargo --version >> rust-env.txt
          echo "target=${{ matrix.os }}" >> rust-env.txt
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Unit tests
        run: cargo test --workspace --all-features
      - name: Upload environment evidence
        uses: actions/upload-artifact@v4
        with:
          name: rust-env-${{ matrix.os }}
          path: rust-env.txt

  js-matrix:
    name: JS/TS ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm --filter @helixforge/console typecheck
      - run: pnpm --filter @helixforge/helix-code-web typecheck
      - run: pnpm --filter @helixforge/helix-collab-web typecheck
      - run: pnpm --filter @helixforge/console build
      - run: pnpm --filter @helixforge/helix-collab-web build

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked || true
      - name: cargo audit
        run: cargo audit || true
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-compose-config:
    name: Compose config validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config -q

  docker-image:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build helix-core image
        run: docker build -t helixforge/helix-core:ci .
        # Full multi-stage Rust build — may take 15–30m; required for sovereign deploy path

  helm-lint:
    name: Helm chart lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: helm lint
        run: |
          helm lint infra/helm/helix-core \
            --set secrets.databaseUrl=postgres://ci:ci@db/helix \
            --set secrets.vaultMasterKey=ci-vault-master-key-not-prod

  helm-template:
    name: Helm template render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: helm template prod
        run: |
          helm template helix-core-prod infra/helm/helix-core \
            -f infra/helm/helix-core/values.yaml \
            -f infra/helm/helix-core/values-prod.yaml \
            --set secrets.databaseUrl=postgres://ci:ci@db/helix \
            --set secrets.vaultMasterKey=ci-vault-master-key-not-prod

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: terraform init & validate
        run: |
          for env in dev prod; do
            echo "=== validate $env ==="
            terraform -chdir=infra/terraform/environments/$env init -backend=false
            terraform -chdir=infra/terraform/environments/$env validate
          done

  smoke:
    name: Core smoke (docker compose)
    runs-on: ubuntu-latest
    needs: docker-image
    steps:
      - uses: actions/checkout@v4
      - name: Start core infrastructure
        run: docker compose up -d postgres nats minio minio-init
      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U helix -d helixforge && exit 0
            sleep 2
          done
          exit 1
      - name: Build helix-core image
        run: docker build -t helixforge/helix-core:smoke .
      - name: Apply migrations
        run: |
          docker run --rm --network host \
            -e DATABASE_URL=postgres://helix:helix@127.0.0.1:55432/helixforge \
            helixforge/helix-core:smoke helix-migrate
      - name: Start gateway
        run: |
          docker run -d --name helix-gateway-smoke \
            --network host \
            -e HELIX_ENV=local \
            -e HELIX_LOCAL_DEV_UNSAFE=1 \
            -e HELIX_ALLOW_DEV_HEADERS=1 \
            -e DATABASE_URL=postgres://helix:helix@127.0.0.1:55432/helixforge \
            -e NATS_URL=nats://127.0.0.1:4222 \
            -e MINIO_ENDPOINT=http://127.0.0.1:9000 \
            -e HELIX_VAULT_MASTER_KEY=smoke-smoke-smoke-master-key \
            helixforge/helix-core:smoke gateway
          for i in $(seq 1 30); do
            curl -fs http://127.0.0.1:8080/healthz && exit 0
            sleep 2
          done
          docker logs helix-gateway-smoke
          exit 1

  collab-smoke:
    name: HelixCollab smoke
    runs-on: ubuntu-latest
    needs: rust-matrix
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile || pnpm install
      - name: Start core infrastructure
        run: docker compose up -d postgres nats minio minio-init
      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U helix -d helixforge && exit 0
            sleep 2
          done
          exit 1
      - name: Apply migrations
        run: cargo run -p helix_db --bin helix-migrate
        env:
          DATABASE_URL: postgres://helix:helix@127.0.0.1:55432/helixforge
      - name: Start HelixCollab API
        run: |
          cargo run -p helix_collab_api > collab-api.log 2>&1 &
          echo "COLLAB_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            curl -fs http://127.0.0.1:8101/healthz && exit 0
            sleep 2
          done
          cat collab-api.log
          exit 1
        env:
          HELIX_ENV: local
          HELIX_LOCAL_DEV_UNSAFE: 1
          HELIX_ALLOW_DEV_HEADERS: 1
          HELIX_DEV_PLATFORM: 1
          DATABASE_URL: postgres://helix:helix@127.0.0.1:55432/helixforge
          NATS_URL: nats://127.0.0.1:4222
          MINIO_ENDPOINT: http://127.0.0.1:9000
          HELIX_VAULT_MASTER_KEY: smoke-smoke-smoke-master-key
          HELIX_AUDIT_HMAC_SECRET: smoke-audit-hmac-secret
          HELIX_WEBHOOK_ALLOW_UNSIGNED: 1
      - name: Run HelixCollab deep smoke
        shell: pwsh
        run: pwsh -File scripts/helix_collab_smoke.ps1
      - name: Stop HelixCollab API
        if: always()
        run: kill $COLLAB_PID || true
