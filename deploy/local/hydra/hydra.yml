# Ory Hydra local OAuth2/OIDC (dev)
version: v2.2.0

dsn: postgres://helix:helix@postgres:5432/hydra?sslmode=disable

serve:
  public:
    port: 4444
    host: 0.0.0.0
    cors:
      enabled: true
      allowed_origins:
        - http://127.0.0.1:3000
        - http://localhost:3000
        - http://127.0.0.1:8080
  admin:
    port: 4445
    host: 0.0.0.0

urls:
  self:
    issuer: http://127.0.0.1:4444/
  consent: http://127.0.0.1:3000/auth/consent
  login: http://127.0.0.1:3000/auth/login
  logout: http://127.0.0.1:3000/auth/logout

# Override in production via environment; never commit real secrets.
secrets:
  system:
    - ${HYDRA_SYSTEM_SECRET:-helixforge-hydra-system-secret-32b}

oidc:
  subject_identifiers:
    supported_types:
      - public
      - pairwise
    pairwise:
      salt: ${HYDRA_PAIRWISE_SALT:-helixforge-hydra-pairwise-salt}

strategies:
  access_token: opaque
  scope: exact

ttl:
  access_token: 1h
  refresh_token: 720h
  id_token: 1h
  auth_code: 10m

log:
  level: info
  format: text

sqa:
  opt_out: true
