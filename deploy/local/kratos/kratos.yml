version: v1.2.0

dsn: postgres://helix:helix@postgres:5432/kratos?sslmode=disable

serve:
  public:
    base_url: http://127.0.0.1:4433/
    cors:
      enabled: true
      allowed_origins:
        - http://127.0.0.1:3000
        - http://localhost:3000
  admin:
    base_url: http://127.0.0.1:4434/

selfservice:
  default_browser_return_url: http://127.0.0.1:3000/
  methods:
    password:
      enabled: true
    link:
      enabled: true
  flows:
    error:
      ui_url: http://127.0.0.1:3000/auth/error
    settings:
      ui_url: http://127.0.0.1:3000/auth/settings
    recovery:
      enabled: true
      ui_url: http://127.0.0.1:3000/auth/recovery
    verification:
      enabled: true
      ui_url: http://127.0.0.1:3000/auth/verification
    logout:
      after:
        default_browser_return_url: http://127.0.0.1:3000/
    login:
      ui_url: http://127.0.0.1:3000/auth/login
    registration:
      ui_url: http://127.0.0.1:3000/auth/registration

log:
  level: info
  format: text

# Override in production via environment; never commit real secrets.
secrets:
  cookie:
    - ${KRATOS_COOKIE_SECRET:-helixforge-dev-cookie-secret-change-me-32b}
  cipher:
    - ${KRATOS_CIPHER_SECRET:-helixforge-dev-cipher-secret-32b}

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    connection_uri: smtps://test:test@mailslurper:1025/?skip_ssl_verify=true
